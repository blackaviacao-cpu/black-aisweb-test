<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Teste AISWEB BLACK</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#081225;
      color:#fff;
      margin:0;
      padding:40px;
    }
    .wrap{
      max-width:800px;
      margin:0 auto;
    }
    .card{
      background:rgba(255,255,255,.04);
      border:1px solid rgba(148,163,184,.2);
      border-radius:16px;
      padding:24px;
    }
    h1{
      margin-top:0;
      margin-bottom:20px;
    }
    label{
      display:block;
      margin-bottom:6px;
      color:#9ca3af;
      font-size:13px;
    }
    input{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      border-radius:10px;
      border:1px solid rgba(148,163,184,.25);
      background:#020617;
      color:#fff;
      margin-bottom:16px;
    }
    button{
      padding:12px 16px;
      border-radius:10px;
      border:1px solid #38bdf8;
      background:transparent;
      color:#fff;
      cursor:pointer;
    }
    button:hover{
      background:rgba(56,189,248,.08);
    }
    pre{
      margin-top:20px;
      background:#020617;
      border:1px solid rgba(148,163,184,.2);
      border-radius:12px;
      padding:16px;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Teste AISWEB BLACK</h1>

      <label>ICAO</label>
      <input id="icao" placeholder="Ex: SBBH" />

      <label>EOBT</label>
      <input id="eobt" type="datetime-local" />

      <button onclick="analisar()">Analisar</button>

      <pre id="resultado">Aguardando análise...</pre>
    </div>
  </div>

  <script>
    async function analisar(){
      const icao = document.getElementById("icao").value.trim().toUpperCase();
      const eobt = document.getElementById("eobt").value;
      const out = document.getElementById("resultado");

      if(!icao || !eobt){
        alert("Preencha ICAO e EOBT.");
        return;
      }

      out.textContent = "Consultando worker...";

      try{
        const r = await fetch("https://aisweb-check.blackaviacao.workers.dev", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ icao, eobt })
        });

        const data = await r.json();

        out.textContent = JSON.stringify(data, null, 2);
      } catch(err){
        out.textContent = "Erro: " + err.message;
      }
    }
  </script>
</body>
</html>
